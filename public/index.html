<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at top, #2d1b3d 0%, #0a0612 60%), #0a0612;
      font-family: 'Courier New', monospace;
      color: #ffd700;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 0.9; }
    }

    .hub {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 520px;
      width: 100%;
    }

    .logo-top {
      font-size: 11px;
      letter-spacing: 10px;
      color: #5b2a86;
      margin-bottom: 8px;
    }

    .logo-main {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      letter-spacing: 4px;
      color: #ffd700;
      text-shadow: 0 0 20px #ff6b9d, 4px 4px 0 #2d1b3d;
      animation: glow-pulse 2s ease-in-out infinite;
      line-height: 1;
      margin-bottom: 4px;
    }

    .logo-sub {
      font-size: 13px;
      letter-spacing: 6px;
      color: #ff5722;
      margin-bottom: 48px;
      animation: neon-orange 1.5s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 20px #ff6b9d, 4px 4px 0 #2d1b3d; }
      50%       { text-shadow: 0 0 30px #ffd700, 4px 4px 0 #2d1b3d; }
    }

    @keyframes neon-orange {
      0%, 100% { color: #ff5722; text-shadow: 0 0 10px #ff5722; }
      50%       { color: #ff8c42; text-shadow: 0 0 20px #ff8c42; }
    }

    .slot-box {
      background: rgba(10, 6, 18, 0.85);
      border: 3px solid #5b2a86;
      padding: 20px 32px;
      margin-bottom: 12px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 30px rgba(91, 42, 134, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
    }

    .slot-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: #aa6fce;
      margin-bottom: 8px;
    }

    #slotName {
      font-size: clamp(22px, 5vw, 36px);
      font-weight: 900;
      letter-spacing: 3px;
      color: #ffd700;
      min-height: 44px;
      transition: color 0.1s;
    }

    #slotName.spinning { color: #5b2a86; }

    #slotSub {
      font-size: 11px;
      letter-spacing: 5px;
      color: #ff5722;
      margin-top: 6px;
      min-height: 18px;
    }

    #progressBar {
      height: 4px;
      background: #5b2a86;
      margin-top: 12px;
      display: none;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: #ffd700;
      transition: width linear;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 3px;
      transition: transform 0.1s, box-shadow 0.1s;
      border-radius: 2px;
    }

    .btn-primary {
      font-size: 20px;
      padding: 14px 40px;
      background: linear-gradient(180deg, #d63384 0%, #5b2a86 100%);
      border: 3px solid #ffd700;
      color: #ffd700;
      text-shadow: 2px 2px 0 #2d1b3d;
      box-shadow: 0 4px 0 #2d1b3d, 0 0 20px rgba(214, 51, 132, 0.5);
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #2d1b3d, 0 0 30px rgba(255, 215, 0, 0.7); }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #2d1b3d; }

    .btn-secondary {
      font-size: 14px;
      padding: 10px 24px;
      background: transparent;
      border: 2px solid #5b2a86;
      color: #aa6fce;
    }

    .btn-secondary:hover { border-color: #aa6fce; color: #ffd700; }

    #gameList {
      margin-top: 32px;
      width: 100%;
    }

    .game-list-title {
      font-size: 10px;
      letter-spacing: 5px;
      color: #5b2a86;
      margin-bottom: 10px;
    }

    .game-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border: 1px solid rgba(91, 42, 134, 0.3);
      margin-bottom: 4px;
      cursor: pointer;
      color: #aa6fce;
      font-size: 12px;
      letter-spacing: 2px;
      transition: all 0.15s;
    }

    .game-item:hover {
      border-color: #ffd700;
      color: #ffd700;
      background: rgba(255, 215, 0, 0.05);
    }

    .game-item-tag {
      font-size: 9px;
      color: #5b2a86;
      letter-spacing: 1px;
    }

    #statusMsg {
      font-size: 12px;
      color: #5b2a86;
      letter-spacing: 3px;
      margin-top: 16px;
    }

    .footer {
      position: fixed;
      bottom: 12px;
      font-size: 9px;
      color: #2d1b3d;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="hub">
  <div class="logo-top">∙ ∙ ∙</div>
  <div class="logo-main">RANDOM</div>
  <div class="logo-main" style="font-size: clamp(28px, 6vw, 48px); margin-bottom:4px;">GAMES</div>
  <div class="logo-sub">∙ ARCADE EDITION ∙</div>

  <div class="slot-box">
    <div class="slot-label">JOGO SELECIONADO</div>
    <div id="slotName">CARREGANDO...</div>
    <div id="slotSub"></div>
  </div>

  <div id="progressBar"><div id="progressFill"></div></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlay" onclick="launchSelected()" style="display:none">JOGAR</button>
    <button class="btn btn-secondary" id="btnReroll" onclick="reroll()" style="display:none">⟳ OUTRO JOGO</button>
  </div>

  <div id="statusMsg"></div>

  <div id="gameList" style="display:none">
    <div class="game-list-title">∙ TODOS OS JOGOS ∙</div>
    <div id="gameListItems"></div>
  </div>
</div>

<div class="footer">RANDOM GAMES ∙ NOVO JOGO TODA SEMANA</div>

<script>
  (function () {
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() < 0.7 ? 1 : 2;
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        width:${size}px; height:${size}px;
        --d:${(2 + Math.random() * 3).toFixed(1)}s;
        animation-delay:${(Math.random() * 3).toFixed(1)}s;
        opacity:${(0.2 + Math.random() * 0.6).toFixed(2)};
      `;
      container.appendChild(s);
    }
  })();

  let games        = [];
  let selectedGame = null;
  let spinTimer    = null;
  let redirectTimer = null;

  const slotName    = document.getElementById('slotName');
  const slotSub     = document.getElementById('slotSub');
  const btnPlay     = document.getElementById('btnPlay');
  const btnReroll   = document.getElementById('btnReroll');
  const statusMsg   = document.getElementById('statusMsg');
  const progressBar = document.getElementById('progressBar');
  const progressFill= document.getElementById('progressFill');

  async function init() {
    try {
      const res = await fetch('/api/games', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      games = await res.json();

      if (!games.length) {
        slotName.textContent = 'EM BREVE...';
        statusMsg.textContent = 'nenhum jogo disponível ainda';
        return;
      }

      renderGameList();
      document.getElementById('gameList').style.display = 'block';
      reroll();
    } catch (err) {
      slotName.textContent = 'ERRO';
      statusMsg.textContent = 'falha ao carregar jogos — tente recarregar';
      console.error(err);
    }
  }

  function pickRandom() {
    return games[Math.floor(Math.random() * games.length)];
  }

  function reroll() {
    clearTimeout(redirectTimer);
    progressBar.style.display = 'none';
    progressFill.style.width  = '0%';
    btnPlay.style.display     = 'none';
    btnReroll.style.display   = 'none';
    statusMsg.textContent     = '';

    if (games.length === 1) {
      selectedGame = games[0];
      showSelected();
      return;
    }

    let ticks = 0;
    const totalTicks = 18 + Math.floor(Math.random() * 10);
    const candidates = [...games];

    clearInterval(spinTimer);
    spinTimer = setInterval(() => {
      ticks++;
      const g = candidates[ticks % candidates.length];
      slotName.textContent = g.name.toUpperCase();
      slotName.classList.toggle('spinning', true);
      slotSub.textContent  = '';

      if (ticks >= totalTicks) {
        clearInterval(spinTimer);
        selectedGame = pickRandom();
        slotName.textContent = selectedGame.name.toUpperCase();
        slotName.classList.remove('spinning');
        slotSub.textContent  = selectedGame.subtitle || '';
        showSelected();
      }
    }, 80);
  }

  function showSelected() {
    btnPlay.style.display   = 'inline-block';
    btnReroll.style.display = 'inline-block';

    progressBar.style.display = 'block';
    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    requestAnimationFrame(() => {
      progressFill.style.transition = 'width 3s linear';
      progressFill.style.width = '100%';
    });

    redirectTimer = setTimeout(launchSelected, 3000);
  }

  function launchSelected() {
    if (!selectedGame) return;
    clearTimeout(redirectTimer);
    window.location.href = selectedGame.path;
  }

  function renderGameList() {
    const container = document.getElementById('gameListItems');
    container.innerHTML = games.map(g => `
      <div class="game-item" onclick="window.location.href='${g.path}'">
        <span>${g.name.toUpperCase()}</span>
        <span class="game-item-tag">${(g.tags || []).join(' · ')}</span>
      </div>
    `).join('');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && selectedGame) launchSelected();
    if (e.key === ' ') { e.preventDefault(); reroll(); }
  });

  init();
</script>
</body>
</html>
