services:

  # ── Aplicação Node.js ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: random-games-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SCORES_DIR: /data/scores
      MAX_SCORES: 10
      RATE_LIMIT_MS: 3000
    volumes:
      # Persiste os scores entre deploys e restarts
      - scores-data:/data
    ports:
      # O Nginx do host faz proxy pass para http://127.0.0.1:3000
      - "127.0.0.1:3000:3000"

# ── Volumes nomeados ───────────────────────────────────────────────────────
volumes:
  scores-data:
    driver: local
